<div class="p-4">
  <div class="flex justify-between items-center mb-4">
    <h1 class="text-xl font-semibold">Unidades</h1>
    <p-button label="Nova" icon="pi pi-plus" routerLink="/empresa" />
  </div>

  <app-data-table
    [cols]="cols"
    [items]="items()"
    [loading]="loading()"
    [rows]="10"
    [totalRecords]="totalRecords()"
    [actions]="actions"
    (onLazyLoad)="carregar($event)"
    (onEdit)="onUpdateEvent($event)"
  />
</div>
