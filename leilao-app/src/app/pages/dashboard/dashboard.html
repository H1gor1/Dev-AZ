<div class="flex flex-col items-center justify-center min-h-[70vh] gap-8 p-8">
  <div class="text-center">
    <h1 class="text-5xl font-bold mb-2">Leilões AZ</h1>
    <p class="text-gray-500 text-lg">Sistema de gestão de leilões</p>
  </div>

  <div class="grid grid-cols-1 md:grid-cols-3 gap-6 w-full max-w-3xl">
    <p-card styleClass="text-center">
      <i class="pi pi-building text-4xl text-blue-500 mb-3 block"></i>
      <h2 class="text-lg font-semibold mb-1">Empresas</h2>
      <p class="text-sm text-gray-500 mb-4">Gerencie empresas participantes</p>
      <p-button label="Acessar" severity="secondary" routerLink="/empresas" fluid />
    </p-card>

    <p-card styleClass="text-center">
      <i class="pi pi-box text-4xl text-green-500 mb-3 block"></i>
      <h2 class="text-lg font-semibold mb-1">Unidades</h2>
      <p class="text-sm text-gray-500 mb-4">Cadastro de unidades</p>
      <p-button label="Acessar" severity="secondary" routerLink="/unidade" fluid />
    </p-card>

    <p-card styleClass="text-center">
      <i class="pi pi-gavel text-4xl text-orange-500 mb-3 block"></i>
      <h2 class="text-lg font-semibold mb-1">Leilões</h2>
      <p class="text-sm text-gray-500 mb-4">Consulte leilões ativos</p>
      <p-button label="Acessar" severity="secondary" routerLink="/leilao" fluid />
    </p-card>
  </div>
</div>
