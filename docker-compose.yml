name: "leilao"

services:
  db:
    image: "postgres:18-alpine"
    restart: "unless-stopped"
    ports:
      - "5432:5432"
    volumes:
      - "postgresqldata:/var/lib/postgresql"
    environment:
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}

  app:
    build:
      context: ./leilao-app
      dockerfile: Dockerfile
    ports:
      - "4200:4200"
    volumes:
      - ./leilao-app/src:/app/src
      - ./leilao-app/angular.json:/app/angular.json
      - ./leilao-app/tsconfig.json:/app/tsconfig.json
      - ./leilao-app/tsconfig.app.json:/app/tsconfig.app.json
    environment:
      - NODE_ENV=development

  api:
    build:
      context: ./leilao-api
      dockerfile: Dockerfile
    ports:
      - 8080:8080
    volumes:
      - ./leilao-api/src:/app/src
      - ./leilao-api/pom.xml:/app/pom.xml
    environment:
      - SPRING_PROFILES_ACTIVE=dev
      - DB_URL=${DB_URL}
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}

volumes:
  postgresqldata:
